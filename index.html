<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CA Tirth Shah | Chartered Accountant | Ahmedabad</title>
<meta name="description" content="Chartered Accountant specializing in International Taxation, GST Advisory, Income Tax Litigation and Transfer Pricing. Based in Ahmedabad, India.">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
  --black:#070707;--black-2:#0d0d0d;--black-3:#111111;
  --white:#f5f2eb;--gold:#C9A84C;--gold-light:#E2C47A;
  --gold-muted:#6E4E18;--gold-dim:rgba(201,168,76,0.10);
  --gold-glow:rgba(201,168,76,0.22);--text:#e8e4da;
  --text-mid:#aaa89e;--text-dim:#666460;--border:#1c1c1c;
  --border-gold:#2e2510;--card:#0f0f0f;
  --ease:cubic-bezier(0.4,0,0.2,1);--t:0.38s;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--black);color:var(--text);overflow-x:hidden;line-height:1.7;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--black);}::-webkit-scrollbar-thumb{background:var(--gold-muted);}
.container{max-width:1260px;margin:0 auto;padding:0 36px;}
a{color:inherit;text-decoration:none;}
img{max-width:100%;display:block;}

/* ── HEADER ── */
#header{position:fixed;top:0;left:0;right:0;z-index:9999;transition:background var(--t) var(--ease),border-color var(--t) var(--ease);border-bottom:1px solid transparent;}
#header.scrolled{background:rgba(7,7,7,0.97);border-bottom-color:var(--border-gold);backdrop-filter:blur(16px);}
.header-inner{display:flex;align-items:center;justify-content:space-between;height:72px;gap:40px;}
.logo-wrap{display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
.logo-main{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--gold);letter-spacing:3px;text-transform:uppercase;line-height:1;}
.logo-sub{font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:4px;color:var(--text-dim);text-transform:uppercase;font-weight:300;}
.primary-nav{display:flex;align-items:center;gap:2px;flex:1;justify-content:flex-end;}
.nav-item{position:static;display:flex;align-items:center;}
.nav-link{font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:500;color:#ccc;padding:10px 16px;transition:color var(--t) var(--ease);display:flex;align-items:center;gap:6px;white-space:nowrap;cursor:pointer;}
.nav-link:hover,.nav-link.active{color:var(--gold);}
.nav-link i.chevron{font-size:8px;transition:transform var(--t) var(--ease);}
.nav-item.has-mega:hover .nav-link .chevron{transform:rotate(180deg);}
.nav-cta{background:var(--gold)!important;color:#000!important;padding:10px 22px!important;font-weight:600!important;letter-spacing:2px;transition:background var(--t) var(--ease),box-shadow var(--t) var(--ease)!important;margin-left:10px;}
.nav-cta:hover{background:var(--gold-light)!important;box-shadow:0 0 24px var(--gold-glow)!important;color:#000!important;}

/* Mega menu */
.mega-wrap{
  position:fixed;top:72px;left:0;width:100vw;
  background:#080808;
  border-top:2px solid var(--gold-muted);
  border-bottom:3px solid var(--gold-muted);
  box-shadow:0 40px 80px rgba(0,0,0,0.98);
  z-index:9998;
  opacity:0;pointer-events:none;
  transform:translateY(-8px);
  transition:opacity 0.25s var(--ease),transform 0.25s var(--ease);
}
.nav-item.has-mega:hover .mega-wrap{opacity:1;pointer-events:all;transform:translateY(0);}
.mega-inner{display:grid;grid-template-columns:260px 1fr;width:100%;max-width:1400px;margin:0 auto;padding:0 60px;min-height:340px;}
.mega-tabs{border-right:1px solid #1e1e1e;padding:36px 0;background:#050505;}
.mega-tab{display:flex;align-items:center;gap:14px;padding:14px 22px;font-size:12px;letter-spacing:1px;color:var(--text-dim);cursor:pointer;transition:all var(--t) var(--ease);border-left:3px solid transparent;text-transform:uppercase;}
.mega-tab .tab-icon{width:30px;height:30px;border:1px solid #222;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;color:var(--gold-muted);transition:all var(--t) var(--ease);}
.mega-tab .tab-sub{display:block;font-size:10px;letter-spacing:0;text-transform:none;color:#444;margin-top:2px;font-weight:300;}
.mega-tab:hover,.mega-tab.is-active{color:var(--gold);border-left-color:var(--gold);background:linear-gradient(to right,rgba(201,168,76,0.07),transparent);}
.mega-tab:hover .tab-icon,.mega-tab.is-active .tab-icon{border-color:var(--gold-muted);color:var(--gold);background:var(--gold-dim);}
.mega-panels{padding:32px 40px 32px 46px;}
.mega-panel{display:none;}
.mega-panel.is-active{display:block;}
.mega-panel-head{display:grid;grid-template-columns:auto 1fr auto;align-items:start;gap:18px;margin-bottom:22px;padding-bottom:16px;border-bottom:1px solid #171717;}
.mega-panel-icon{width:44px;height:44px;border:1px solid var(--border-gold);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--gold-muted);flex-shrink:0;}
.mega-panel-head h3{font-family:'Playfair Display',serif;font-size:20px;color:var(--text);font-weight:600;margin-bottom:4px;}
.mega-panel-head p{font-size:12px;color:var(--text-dim);line-height:1.65;max-width:440px;}
.mega-panel-cta{align-self:center;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);border:1px solid var(--gold-muted);padding:8px 14px;white-space:nowrap;transition:all var(--t) var(--ease);display:inline-flex;align-items:center;gap:6px;}
.mega-panel-cta:hover{background:var(--gold-dim);}
.mega-services-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px 18px;}
.mega-service-item{font-size:12px;color:var(--text-mid);padding:9px 0;border-bottom:1px solid #141414;display:flex;align-items:center;gap:9px;transition:all var(--t) var(--ease);}
.mega-service-item .si-icon{width:24px;height:24px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--gold-muted);border:1px solid #1e1e1e;transition:all var(--t) var(--ease);}
.mega-service-item:hover{color:var(--gold);padding-left:4px;}
.mega-service-item:hover .si-icon{color:var(--gold);border-color:var(--gold-muted);background:var(--gold-dim);}

/* ... (all intermediate HTML/CSS/JS remains exactly as in your current file) ... */

/* ── Scroll reveal ── */
const ro = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); ro.unobserve(e.target); } });
}, { threshold: 0.07 });
document.querySelectorAll('.reveal').forEach(el => ro.observe(el));

// ── Active nav highlighting ──
const allNavLinks = document.querySelectorAll('#primary-nav .nav-link:not(.nav-cta)');
const sectionEls  = ['about','services-grid','insights','resources','contact'].map(id => document.getElementById(id)).filter(Boolean);

function updateActiveNav() {
  const y = window.scrollY + 120;
  let activeId = '';

  sectionEls.forEach(sec => {
    if (sec.offsetTop <= y && sec.offsetTop + sec.offsetHeight > y) {
      activeId = sec.id;
    }
  });

  allNavLinks.forEach(link => {
    const href = link.getAttribute('href') || '';
    link.classList.toggle('active', href === '#' + activeId);
  });
}

window.addEventListener('scroll', updateActiveNav, { passive: true });
window.addEventListener('resize', updateActiveNav, { passive: true });
updateActiveNav();
</script>
</body>
</html>
